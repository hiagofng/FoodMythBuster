foodmythbuster:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: oauth
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: "{{ env_var('BQ_DATASET', 'foodmythbuster') }}"
      location: "{{ env_var('GCP_REGION', 'southamerica-east1') }}"
      threads: 4
      priority: interactive
      maximum_bytes_billed: 1000000000
      job_execution_timeout_seconds: 300
      gcs_bucket: "{{ env_var('GCS_BUCKET', '') }}"
    duckdb:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH', 'data/foodmythbuster.duckdb') }}"
      schema: staging
      threads: 4
